modLoader = "javafml"
loaderVersion = "[47,)"
license = "MIT"

[[mods]]
modId = "tlmaicache"
version = "${file.jarVersion}"
displayName = "TLM AI Chat Cache"
description = '''
Cache layer for Touhou Little Maid's AI chat system.
Maps player natural language to game operations locally,
reducing LLM API calls with zero-latency cached responses.
'''

[[dependencies.tlmaicache]]
modId = "forge"
mandatory = true
versionRange = "[47,)"
ordering = "NONE"
side = "BOTH"

[[dependencies.tlmaicache]]
modId = "minecraft"
mandatory = true
versionRange = "[1.20.1,1.21)"
ordering = "NONE"
side = "BOTH"

[[dependencies.tlmaicache]]
modId = "touhou_little_maid"
mandatory = true
versionRange = "[1.5.0,)"
ordering = "AFTER"
side = "BOTH"

[[mixins]]
config = "tlm-ai-cache.mixins.json"
